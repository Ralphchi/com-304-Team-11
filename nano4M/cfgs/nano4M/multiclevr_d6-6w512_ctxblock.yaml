# Variant 2 (V2): context-block masking on image-like modalities (RGB, depth, normals),
# baseline random masking on scene_desc.
# Owned by Gabriel. See proposal Section III.V2.
#
# Each image modality gets a single contiguous s x s visible "context block"
# in the 16x16 token grid; everything outside the block is a candidate target.
# scene_desc keeps baseline random masking. s is sampled per call from {4, 5, 6};
# block POSITION is sampled per image modality independently.

run_name: multiclevr_d6-6w512_ctxblock
output_dir: ./outputs/auto

global_vars:
  batch_size: 256
  modalities: ["tok_rgb@256", "tok_depth@256", "tok_normal@256", "scene_desc"]
  vocab_sizes: [64000, 64000, 64000, 50304]
  max_seq_lens: [256, 256, 256, 256]
  input_alphas: [1.0, 1.0, 1.0, 1.0]
  target_alphas: [1.0, 1.0, 1.0, 1.0]
  input_tokens_range: [1, 128]
  target_tokens_range: [1, 128]

# Training
batch_size: ${global_vars.batch_size}
total_tokens: 5000
warmup_tokens: 500
num_tokens_per_sample: 256
lr: 0.0006
min_lr: 0.000001
weight_decay: 0.05
clip_grad: 1.0
dtype: bf16

eval_freq: 100
save_ckpt_freq: 1000

log_wandb: True
wandb_project: COM304_nano4M_extension
wandb_entity: Com304-team11
wandb_run_name: auto

model_config:
  _target_: nanofm.models.fourm.FourM
  enc_tokens_read_key: enc_tokens
  dec_tokens_read_key: dec_tokens
  enc_modalities_read_key: enc_modalities
  dec_modalities_read_key: dec_modalities
  enc_positions_read_key: enc_positions
  dec_positions_read_key: dec_positions
  enc_pad_mask_read_key: enc_pad_mask
  dec_pad_mask_read_key: dec_pad_mask
  modalities: ${global_vars.modalities}
  vocab_sizes: ${global_vars.vocab_sizes}
  max_seq_lens: ${global_vars.max_seq_lens}
  dim: 512
  enc_depth: 6
  dec_depth: 6
  head_dim: 64
  per_modality_loss_avg: True

train_loader_config:
  _target_: nanofm.data.multimodal.create_multimodal_masked_dataloader
  root_dir: /work/com-304/datasets/clevr_com_304/
  split: train
  modalities: ${global_vars.modalities}
  vocab_sizes: ${global_vars.vocab_sizes}
  max_seq_lens: ${global_vars.max_seq_lens}
  overlap_vocab: True
  overlap_posembs: True
  input_alphas: ${global_vars.input_alphas}
  target_alphas: ${global_vars.target_alphas}
  input_tokens_range: ${global_vars.input_tokens_range}
  target_tokens_range: ${global_vars.target_tokens_range}
  sample_from_k_augmentations: 10
  text_tokenizer_path: gpt2
  text_max_length: 256
  batch_size: ${global_vars.batch_size}
  infinite: True
  num_workers: 10
  pin_memory: True
  shuffle: True
  drop_last: True
  distributed: True
  masking:
    _target_: nanofm.data.multimodal.context_block_masking.ContextBlockMasking
    image_modalities: ["tok_rgb@256", "tok_depth@256", "tok_normal@256"]
    text_modalities: ["scene_desc"]
    grid_size: 16
    context_block_sizes: [4, 5, 6]

eval_loader_config:
  _target_: nanofm.data.multimodal.create_multimodal_masked_dataloader
  root_dir: /work/com-304/datasets/clevr_com_304/
  split: val
  modalities: ${global_vars.modalities}
  vocab_sizes: ${global_vars.vocab_sizes}
  max_seq_lens: ${global_vars.max_seq_lens}
  overlap_vocab: True
  overlap_posembs: True
  input_alphas: ${global_vars.input_alphas}
  target_alphas: ${global_vars.target_alphas}
  input_tokens_range: ${global_vars.input_tokens_range}
  target_tokens_range: ${global_vars.target_tokens_range}
  text_tokenizer_path: gpt2
  text_max_length: 256
  batch_size: ${global_vars.batch_size}
  num_workers: 10
  pin_memory: True
  shuffle: False
  drop_last: False
  distributed: True
  masking:
    _target_: nanofm.data.multimodal.context_block_masking.ContextBlockMasking
    image_modalities: ["tok_rgb@256", "tok_depth@256", "tok_normal@256"]
    text_modalities: ["scene_desc"]
    grid_size: 16
    context_block_sizes: [4, 5, 6]
